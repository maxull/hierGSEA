<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <rect width="1100" height="620" fill="white"/>
  <text x="50" y="55" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#222222">`hier_gsea_result` structure</text>
  <text x="50" y="92" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#444444">The output object keeps statistical results, hierarchy metadata, plotting coordinates, and provenance together.</text>

  <rect x="410" y="130" width="280" height="70" rx="12" fill="#E8F0FB" stroke="#6783A0" stroke-width="2"/>
  <text x="455" y="173" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1F2A21">hier_gsea_result</text>

  <rect x="65" y="275" width="260" height="90" rx="12" fill="#F6E4C9" stroke="#8A6A38" stroke-width="2"/>
  <text x="100" y="320" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1F2A21">result_raw</text>
  <text x="100" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#333333">original gseaResult</text>

  <rect x="365" y="255" width="370" height="130" rx="12" fill="#DCEEFF" stroke="#47637B" stroke-width="2"/>
  <text x="400" y="300" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1F2A21">results_tbl</text>
