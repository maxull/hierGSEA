  <text x="400" y="360" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#333333">branch retention and ordering</text>

  <rect x="785" y="275" width="255" height="90" rx="12" fill="#F0F4E7" stroke="#748861" stroke-width="2"/>
