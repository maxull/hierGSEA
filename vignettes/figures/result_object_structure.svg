  <text x="825" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#333333">settings and provenance</text>

  <rect x="140" y="455" width="235" height="90" rx="12" fill="#F8F8F8" stroke="#CCCCCC" stroke-width="1.5"/>
